services:
    db:
        image: postgres:16-alpine
        container_name: catshelter-db
        environment:
            POSTGRES_DB: catshelter
            POSTGRES_USER: catshelter
            POSTGRES_PASSWORD: catshelter
        ports:
            - '5432:5432'
        volumes:
            - postgres-data:/var/lib/postgresql/data
        healthcheck:
            test: ['CMD-SHELL', 'pg_isready -U catshelter -d catshelter']
            interval: 10s
            timeout: 5s
            retries: 10

    app:
        build:
            context: .
            dockerfile: Dockerfile
        container_name: catshelter-app
        depends_on:
            db:
                condition: service_healthy
        environment:
            SPRING_PROFILES_ACTIVE: docker
        ports:
            - '8080:8080'
        restart: unless-stopped

volumes:
    postgres-data:
